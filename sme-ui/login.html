<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExpertEASE - Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            position: relative;
        }

        /* Ambient Glows for Login */
        .login-glow-1 {
            position: absolute;
            top: -10%;
            left: -10%;
            width: 50vw;
            height: 50vw;
            background: radial-gradient(circle, var(--glow-1) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .login-glow-2 {
            position: absolute;
            bottom: -10%;
            right: -10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, var(--glow-2) 0%, transparent 70%);
            z-index: 0;
            pointer-events: none;
        }

        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px var(--shadow-color);
            animation: fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h2 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .auth-form {
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .input-group input {
            width: 100%;
            padding: 0.85rem 1rem;
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        .input-group input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: var(--accent-color);
            color: var(--p1);
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .auth-switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .auth-switch a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
            transition: color 0.2s;
        }

        .auth-switch a:hover {
            filter: brightness(1.2);
            text-decoration: underline;
        }

        .error-msg {
            color: #ff4d4d;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 0.5rem;
            min-height: 20px;
        }

        .light-mode .auth-btn {
            color: var(--p5);
        }
    </style>
</head>

<body>
    <div class="login-glow-1"></div>
    <div class="login-glow-2"></div>

    <div class="auth-container" id="login-panel">
        <div class="auth-header">
            <img src="logo.png" alt="ExpertEASE Logo" class="logo-img" style="height: 48px; margin-bottom: 1rem;">
            <h2>Welcome Back</h2>
            <p>Sign in to access ExpertEASE Middleware</p>
        </div>
        <form class="auth-form" id="login-form">
            <div class="input-group">
                <label for="login-username">Username or Email</label>
                <input type="text" id="login-username" required placeholder="Enter username">
            </div>
            <div class="input-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" required placeholder="••••••••">
            </div>
            <div class="error-msg" id="login-error"></div>
            <button type="submit" class="auth-btn" id="login-submit-btn">Sign In</button>
        </form>
        <div class="auth-switch">
            Don't have an account? <a id="show-signup">Sign Up</a>
        </div>
    </div>

    <div class="auth-container ui-hidden" id="signup-panel">
        <div class="auth-header">
            <img src="logo.png" alt="ExpertEASE Logo" class="logo-img" style="height: 48px; margin-bottom: 1rem;">
            <h2>Create Account</h2>
            <p>Register for ExpertEASE Access</p>
        </div>
        <form class="auth-form" id="signup-form">
            <div class="input-group">
                <label for="signup-username">Username</label>
                <input type="text" id="signup-username" required placeholder="Choose a username">
            </div>
            <div class="input-group">
                <label for="signup-email">Email Address</label>
                <input type="email" id="signup-email" required placeholder="your_name@gmail.com">
            </div>
            <div class="input-group">
                <label for="signup-password">Password</label>
                <input type="password" id="signup-password" required placeholder="Create a strong password">
            </div>
            <div class="error-msg" id="signup-error"></div>
            <button type="submit" class="auth-btn" id="signup-submit-btn">Create Account</button>
        </form>
        <div class="auth-switch">
            Already have an account? <a id="show-login">Sign In</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="auth.js"></script>
</body>

</html>
